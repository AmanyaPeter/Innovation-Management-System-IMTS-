<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Innovation Management System</title>
  <link rel="icon" type="image/x-icon" href="boulogo.ico">
  <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="password-page">
  <div class="password-card">
    <div class="logo">
      <img src="boulogo.ico" alt="Bank of Uganda">
    </div>
    <h1>Forgot Password</h1>
    <p class="sub">Enter your email address and we'll send you a reset link.</p>

    <div class="form-group">
      <label for="resetEmail">Email Address</label>
      <input type="text" id="resetEmail" class="form-control" placeholder="Enter your registered email">
    </div>

    <button type="button" class="login-btn" onclick="handleForgotPassword()" style="width:100%;height:42px;background:#0078d4;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:500;cursor:pointer;">Send Reset Link</button>

    <a href="index.html" class="back-link">&larr; Back to Login</a>
  </div>

  <script src="services/ideaService.js"></script>
  <script src="services/userService.js"></script>
  <script src="services/notificationService.js"></script>
  <script src="services/resourceService.js"></script>
  <script src="services/categoryService.js"></script>
  <script src="services/activityService.js"></script>
  <script src="utils/toast.js"></script>
<script src="utils/search.js"></script>
<script src="utils/sort.js"></script>
<script src="utils/filter.js"></script>
<script src="utils/pagination.js"></script>
<script src="utils/table.js"></script>
<script src="utils/modal.js"></script>
<script src="js/auth.js"></script>
  <script src="js/app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
